<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect 
    x="0" 
    y="0" 
    width="300" 
    height="300" 
    fill="#000000"
  />
  
  <!-- Single Bold Ring -->
  <circle 
    cx="150" 
    cy="150" 
    r="120" 
    fill="none" 
    stroke="#D4AF37" 
    stroke-width="8"
  />
  
  <!-- Bold Minimalist Shoe -->
  <path 
    d="M90 140
       C90 140, 100 130, 120 130
       C140 130, 150 135, 160 135
       C180 135, 190 130, 210 130
       L210 160
       C210 160, 180 170, 150 170
       C120 170, 90 160, 90 160
       Z" 
    fill="#D4AF37"
  />
  
  <!-- Bold Minimal Laces -->
  <path 
    d="M140 135 L140 155 M160 135 L160 155" 
    stroke="#000000" 
    stroke-width="6"
  />
  
  <!-- Extra Bold Store Name -->
  <text 
    x="150" 
    y="100" 
    font-family="Montserrat, sans-serif" 
    font-size="36" 
    font-weight="900" 
    text-anchor="middle" 
    fill="#D4AF37"
  >
    REPSHOES
  </text>
  
  <!-- Bold Line Separator -->
  <line 
    x1="100" 
    y1="200" 
    x2="200" 
    y2="200" 
    stroke="#D4AF37" 
    stroke-width="4"
  />
  
  <!-- Single Word Tagline -->
  <text 
    x="150" 
    y="225" 
    font-family="Montserrat, sans-serif" 
    font-size="18" 
    font-weight="800" 
    text-anchor="middle" 
    fill="#D4AF37"
  >
    LUXURY
  </text>
</svg>