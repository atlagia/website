<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect 
    x="0" 
    y="0" 
    width="300" 
    height="300" 
    fill="#000000"
  />
  
  <!-- Single Bold Ring -->
  <circle 
    cx="150" 
    cy="150" 
    r="120" 
    fill="none" 
    stroke="#D4AF37" 
    stroke-width="8"
  />
  
  <!-- Bold Theater Masks -->
  <g fill="#D4AF37">
    <!-- Comedy Mask -->
    <path 
      d="M110 130
         C100 120 100 140 110 150
         C120 160 130 160 140 150
         C150 140 150 120 140 110
         C130 100 120 100 110 130
         Z"
    />
    
    <!-- Tragedy Mask -->
    <path 
      d="M160 130
         C150 120 150 140 160 150
         C170 160 180 160 190 150
         C200 140 200 120 190 110
         C180 100 170 100 160 130
         Z"
    />
  </g>
  
  <!-- Mask Eyes (Black) -->
  <g fill="#000000">
    <circle cx="120" cy="130" r="8" />
    <circle cx="180" cy="130" r="8" />
  </g>
  
  <!-- Extra Bold Store Name -->
  <text 
    x="150" 
    y="100" 
    font-family="Montserrat, sans-serif" 
    font-size="36" 
    font-weight="900" 
    text-anchor="middle" 
    fill="#D4AF37"
  >
    COSPLAYFITS
  </text>
  
  <!-- Bold Line Separator -->
  <line 
    x1="100" 
    y1="200" 
    x2="200" 
    y2="200" 
    stroke="#D4AF37" 
    stroke-width="4"
  />
  
  <!-- Single Word Tagline -->
  <text 
    x="150" 
    y="225" 
    font-family="Montserrat, sans-serif" 
    font-size="18" 
    font-weight="800" 
    text-anchor="middle" 
    fill="#D4AF37"
  >
    PREMIUM
  </text>
</svg>