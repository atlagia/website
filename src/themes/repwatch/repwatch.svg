<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128">
    <!-- Watch Case -->
    <circle cx="64" cy="64" r="56" fill="none" stroke="currentColor" stroke-width="4"/>
    <circle cx="64" cy="64" r="52" fill="none" stroke="currentColor" stroke-width="2"/>
    
    <!-- Watch Crown -->
    <path d="M116 64h8M112 56l6-3M112 72l6 3" stroke="currentColor" stroke-width="3"/>
    
    <!-- Watch Hands -->
    <line x1="64" y1="64" x2="64" y2="32" stroke="currentColor" stroke-width="3" class="hour-hand"/>
    <line x1="64" y1="64" x2="90" y2="64" stroke="currentColor" stroke-width="2" class="minute-hand"/>
    <line x1="64" y1="64" x2="64" y2="20" stroke="#ff3333" stroke-width="1" class="second-hand"/>
    
    <!-- Hour Markers -->
    <circle cx="64" cy="20" r="2" fill="currentColor"/>
    <circle cx="98" cy="34" r="2" fill="currentColor"/>
    <circle cx="108" cy="64" r="2" fill="currentColor"/>
    <circle cx="98" cy="94" r="2" fill="currentColor"/>
    <circle cx="64" cy="108" r="2" fill="currentColor"/>
    <circle cx="30" cy="94" r="2" fill="currentColor"/>
    <circle cx="20" cy="64" r="2" fill="currentColor"/>
    <circle cx="30" cy="34" r="2" fill="currentColor"/>
    
    <!-- Center Point -->
    <circle cx="64" cy="64" r="3" fill="currentColor"/>
    
    <!-- Style for Dark/Light Mode -->
    <style>
        svg { color: #000; }
        @media (prefers-color-scheme: dark) {
            svg { color: #FFF; }
        }
        
        /* Optional: Animate the hands */
        .hour-hand {
            transform-origin: 64px 64px;
            animation: rotate 43200s linear infinite;
        }
        .minute-hand {
            transform-origin: 64px 64px;
            animation: rotate 3600s linear infinite;
        }
        .second-hand {
            transform-origin: 64px 64px;
            animation: rotate 60s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</svg>