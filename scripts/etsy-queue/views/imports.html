<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy → Shopify Import Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: #6c5ce740;
    --green: #00d68f;
    --green-glow: #00d68f30;
    --red: #ff6b6b;
    --red-glow: #ff6b6b30;
    --orange: #ffa94d;
    --blue: #74b9ff;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    padding: 28px 40px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0f0f18 0%, var(--bg) 100%);
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header h1 span { color: var(--accent); }

  .header-links {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .header-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 8px;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .header-links a:hover {
    color: var(--text);
    border-color: var(--border);
    background: var(--surface);
  }

  .status-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .container { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 20px;
  }

  /* ── New Import Form ── */
  .import-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 40px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 16px;
    align-items: end;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  .form-group label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .form-group input, .form-group select {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Outfit', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .form-group input::placeholder { color: var(--text-dim); opacity: 0.5; }

  .btn {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-sm {
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 6px;
  }

  .btn-outline {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-outline:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-danger { background: var(--red); color: white; }
  .btn-success { background: var(--green); color: #0a0a0f; }

  /* ── Stats Row ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-card .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .stat-card .stat-value {
    font-size: 32px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -1px;
  }

  .stat-card.waiting .stat-value { color: var(--blue); }
  .stat-card.active .stat-value { color: var(--orange); }
  .stat-card.completed .stat-value { color: var(--green); }
  .stat-card.failed .stat-value { color: var(--red); }

  /* ── Progress Bar ── */
  .progress-container { margin-bottom: 40px; }

  .progress-track {
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }

  .progress-fill-done {
    background: var(--green);
    height: 100%;
    transition: width 0.5s ease;
  }

  .progress-fill-active {
    background: var(--orange);
    height: 100%;
    transition: width 0.5s ease;
  }

  .progress-fill-failed {
    background: var(--red);
    height: 100%;
    transition: width 0.5s ease;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Shop Cards ── */
  .shops-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .shop-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color 0.2s;
  }

  .shop-card:hover { border-color: var(--accent); }

  .shop-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .shop-card-title {
    font-size: 16px;
    font-weight: 600;
  }

  .shop-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .shop-badge.active { background: var(--orange); color: #0a0a0f; }
  .shop-badge.done { background: var(--green); color: #0a0a0f; }
  .shop-badge.idle { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

  .shop-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .shop-stat {
    text-align: center;
    padding: 8px 0;
    background: var(--surface-2);
    border-radius: 8px;
  }

  .shop-stat-num {
    font-size: 18px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .shop-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

  .shop-card-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  /* ── Jobs Table ── */
  .jobs-section { margin-top: 40px; }

  .jobs-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .tab-bar { display: flex; gap: 4px; }

  .tab {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab:hover:not(.active) { background: var(--surface-2); color: var(--text); }

  .jobs-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .jobs-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .jobs-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .jobs-table tr:hover td { background: var(--surface-2); }

  .state-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }

  .state-badge.completed { background: var(--green-glow); color: var(--green); }
  .state-badge.failed { background: var(--red-glow); color: var(--red); }
  .state-badge.active { background: #ffa94d30; color: var(--orange); }
  .state-badge.waiting, .state-badge.delayed { background: #74b9ff30; color: var(--blue); }

  .shopify-link {
    color: var(--accent);
    text-decoration: none;
    font-family: 'Outfit', sans-serif;
  }

  .shopify-link:hover { text-decoration: underline; }

  .error-text {
    color: var(--red);
    font-size: 11px;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Activity Feed ── */
  .activity-feed {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    max-height: 300px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 20px;
  }

  .activity-feed::-webkit-scrollbar { width: 6px; }
  .activity-feed::-webkit-scrollbar-track { background: var(--surface); }
  .activity-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .activity-line {
    padding: 4px 0;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid #1a1a2680;
  }

  .activity-time { color: var(--text-dim); min-width: 75px; }
  .activity-type { font-weight: 600; min-width: 65px; }
  .activity-type.done { color: var(--green); }
  .activity-type.fail { color: var(--red); }
  .activity-type.active { color: var(--orange); }
  .activity-msg { color: var(--text); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  @media (max-width: 900px) {
    .container { padding: 20px; }
    .form-row { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(3, 1fr); }
    .shops-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Etsy <span>&rarr;</span> Shopify Imports</h1>
  <div class="header-links">
    <div class="status-bar">
      <div class="status-dot" id="sseDot"></div>
      <span id="sseStatus">connecting...</span>
    </div>
    <a href="/admin/queues" target="_blank">Bull Board</a>
  </div>
</div>

<div class="container">

  <!-- New Import Form -->
  <div class="section-title">New Import</div>
  <div class="import-form">
    <div class="form-row">
      <div class="form-group">
        <label>Target Store</label>
        <input type="text" id="fTarget" placeholder="jacketverse" />
      </div>
      <div class="form-group">
        <label>Site Name</label>
        <input type="text" id="fSiteName" placeholder="JacketVerse" />
      </div>
      <div class="form-group">
        <label>Data File Path</label>
        <input type="text" id="fDataFile" placeholder="data/etsy-to-shopify/jacketverse/shop-data.json" />
      </div>
      <button class="btn btn-primary" id="startBtn" onclick="startImport()">Start Import</button>
    </div>
  </div>

  <!-- Global Stats -->
  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">-</div></div>
    <div class="stat-card waiting"><div class="stat-label">Waiting</div><div class="stat-value" id="statWaiting">-</div></div>
    <div class="stat-card active"><div class="stat-label">Active</div><div class="stat-value" id="statActive">-</div></div>
    <div class="stat-card completed"><div class="stat-label">Completed</div><div class="stat-value" id="statCompleted">-</div></div>
    <div class="stat-card failed"><div class="stat-label">Failed</div><div class="stat-value" id="statFailed">-</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-container" id="progressBox" style="display:none">
    <div class="progress-track">
      <div class="progress-fill-done" id="pDone" style="width:0"></div>
      <div class="progress-fill-active" id="pActive" style="width:0"></div>
      <div class="progress-fill-failed" id="pFailed" style="width:0"></div>
    </div>
    <div class="progress-meta">
      <span id="pLabel">0 / 0</span>
      <span id="pPercent">0%</span>
    </div>
  </div>

  <!-- Shop Cards -->
  <div class="section-title">Targets</div>
  <div class="shops-grid" id="shopsGrid">
    <div class="empty-state"><h3>No imports yet</h3><p>Start by entering an Etsy shop above</p></div>
  </div>

  <!-- Jobs Table -->
  <div class="jobs-section">
    <div class="jobs-header">
      <div class="section-title" style="margin-bottom:0">Jobs</div>
      <div class="tab-bar">
        <button class="tab active" onclick="setTab('all')">All</button>
        <button class="tab" onclick="setTab('active')">Active</button>
        <button class="tab" onclick="setTab('completed')">Completed</button>
        <button class="tab" onclick="setTab('failed')">Failed</button>
        <button class="tab" onclick="setTab('waiting')">Waiting</button>
      </div>
    </div>
    <table class="jobs-table">
      <thead>
        <tr>
          <th>Job ID</th>
          <th>Listing</th>
          <th>State</th>
          <th>Attempts</th>
          <th>Product</th>
          <th>Error</th>
        </tr>
      </thead>
      <tbody id="jobsBody">
        <tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:30px">No jobs yet</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Activity Feed -->
  <div class="section-title" style="margin-top:40px">Live Activity</div>
  <div class="activity-feed" id="activityFeed">
    <div class="activity-line"><span class="activity-time">--:--:--</span><span class="activity-msg" style="color:var(--text-dim)">Waiting for events...</span></div>
  </div>

</div>

<script>
let currentTarget = '';
let currentTab = 'all';
let activityLines = [];

function time() {
  return new Date().toLocaleTimeString('en-GB', { hour12: false });
}

function addActivity(type, msg) {
  activityLines.unshift({ time: time(), type, msg });
  if (activityLines.length > 200) activityLines.length = 200;
  const feed = document.getElementById('activityFeed');
  feed.innerHTML = activityLines.map(a =>
    `<div class="activity-line"><span class="activity-time">${a.time}</span><span class="activity-type ${a.type}">${a.type}</span><span class="activity-msg">${a.msg}</span></div>`
  ).join('');
}

// ── SSE ──
function connectSSE() {
  const es = new EventSource('/api/imports/events');
  es.onopen = () => {
    document.getElementById('sseDot').style.background = 'var(--green)';
    document.getElementById('sseStatus').textContent = 'connected';
  };
  es.onerror = () => {
    document.getElementById('sseDot').style.background = 'var(--red)';
    document.getElementById('sseStatus').textContent = 'reconnecting...';
  };
  es.addEventListener('completed', e => {
    const d = JSON.parse(e.data);
    addActivity('done', `${d.jobId} → ${d.product?.handle || d.product?.title || 'ok'}`);
    refreshAll();
  });
  es.addEventListener('failed', e => {
    const d = JSON.parse(e.data);
    addActivity('fail', `${d.jobId} → ${(d.error || '').slice(0, 100)}`);
    refreshAll();
  });
  es.addEventListener('active', e => {
    const d = JSON.parse(e.data);
    addActivity('active', `${d.jobId} processing...`);
  });
}

// ── API helpers ──
async function api(path, opts = {}) {
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

// ── Refresh ──
async function refreshAll() {
  const targets = await api('/api/imports/targets');
  if (targets.length === 0) return;

  if (!currentTarget && targets.length > 0) currentTarget = targets[0];

  let globalTotal = 0, globalWaiting = 0, globalActive = 0, globalCompleted = 0, globalFailed = 0;

  const cards = [];
  for (const t of targets) {
    const s = await api(`/api/imports/${t}/status`);
    const tj = s.targetJobs;
    globalTotal += tj.total;
    globalWaiting += tj.waiting;
    globalActive += tj.active;
    globalCompleted += tj.completed;
    globalFailed += tj.failed;

    const badge = tj.active > 0 ? 'active' : (tj.waiting > 0 ? 'active' : (tj.total > 0 ? 'done' : 'idle'));
    const badgeText = tj.active > 0 ? 'processing' : (tj.waiting > 0 ? 'queued' : (tj.total > 0 ? 'done' : 'idle'));

    cards.push(`
      <div class="shop-card" onclick="selectTarget('${t}')">
        <div class="shop-card-header">
          <div class="shop-card-title">${t}</div>
          <div class="shop-badge ${badge}">${badgeText}</div>
        </div>
        <div class="shop-stats">
          <div class="shop-stat"><div class="shop-stat-num">${tj.total}</div><div class="shop-stat-label">Total</div></div>
          <div class="shop-stat"><div class="shop-stat-num" style="color:var(--green)">${tj.completed}</div><div class="shop-stat-label">Done</div></div>
          <div class="shop-stat"><div class="shop-stat-num" style="color:var(--orange)">${tj.active + tj.waiting}</div><div class="shop-stat-label">Pending</div></div>
          <div class="shop-stat"><div class="shop-stat-num" style="color:var(--red)">${tj.failed}</div><div class="shop-stat-label">Failed</div></div>
        </div>
        <div class="shop-card-actions">
          <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();retryFailed('${t}')">Retry Failed</button>
          <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();pauseQueue('${t}')">Pause</button>
          <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();resumeQueue('${t}')">Resume</button>
        </div>
      </div>
    `);
  }

  document.getElementById('shopsGrid').innerHTML = cards.join('') || '<div class="empty-state"><h3>No imports yet</h3></div>';

  document.getElementById('statTotal').textContent = globalTotal;
  document.getElementById('statWaiting').textContent = globalWaiting;
  document.getElementById('statActive').textContent = globalActive;
  document.getElementById('statCompleted').textContent = globalCompleted;
  document.getElementById('statFailed').textContent = globalFailed;

  if (globalTotal > 0) {
    document.getElementById('progressBox').style.display = 'block';
    const donePct = (globalCompleted / globalTotal) * 100;
    const activePct = (globalActive / globalTotal) * 100;
    const failPct = (globalFailed / globalTotal) * 100;
    document.getElementById('pDone').style.width = donePct + '%';
    document.getElementById('pActive').style.width = activePct + '%';
    document.getElementById('pFailed').style.width = failPct + '%';
    document.getElementById('pLabel').textContent = `${globalCompleted + globalFailed} / ${globalTotal}`;
    document.getElementById('pPercent').textContent = Math.round(((globalCompleted + globalFailed) / globalTotal) * 100) + '%';
  }

  if (currentTarget) refreshJobs();
}

async function refreshJobs() {
  if (!currentTarget) return;
  const stateFilter = currentTab === 'all' ? 'all' : currentTab;
  const jobs = await api(`/api/imports/${currentTarget}/jobs?state=${stateFilter}`);

  if (jobs.length === 0) {
    document.getElementById('jobsBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:30px">No jobs for this filter</td></tr>';
    return;
  }

  const rows = jobs.map(j => {
    const product = j.product
      ? `<a class="shopify-link" href="https://admin.shopify.com/store/jacketmarkets/products/${j.product.id?.split('/').pop()}" target="_blank">${j.product.handle || j.product.title || '-'}</a>`
      : '-';
    const error = j.failedReason ? `<span class="error-text" title="${j.failedReason}">${j.failedReason}</span>` : '-';
    return `<tr>
      <td>${j.id}</td>
      <td>${j.listingId}</td>
      <td><span class="state-badge ${j.state}">${j.state}</span></td>
      <td>${j.attemptsMade}</td>
      <td>${product}</td>
      <td>${error}</td>
    </tr>`;
  });

  document.getElementById('jobsBody').innerHTML = rows.join('');
}

function selectTarget(t) {
  currentTarget = t;
  refreshJobs();
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  refreshJobs();
}

// ── Actions ──
async function startImport() {
  const target = document.getElementById('fTarget').value.trim();
  const siteName = document.getElementById('fSiteName').value.trim();
  const dataFile = document.getElementById('fDataFile').value.trim();
  if (!target || !dataFile) return alert('Target and Data File are required');

  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = 'Starting...';

  try {
    const result = await api('/api/imports/start', {
      method: 'POST',
      body: JSON.stringify({ target, siteName, dataFile }),
    });
    addActivity('done', `Enqueued ${result.enqueued} jobs for ${target} (${result.skipped} skipped)`);
    currentTarget = target;
    refreshAll();
  } catch (e) {
    addActivity('fail', `Start failed: ${e.message}`);
  }

  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = 'Start Import';
}

async function retryFailed(target) {
  const r = await api(`/api/imports/${target}/retry-failed`, { method: 'POST' });
  addActivity('active', `Retried ${r.retried} failed jobs for ${target}`);
  refreshAll();
}

async function pauseQueue(target) {
  await api(`/api/imports/${target}/pause`, { method: 'POST' });
  addActivity('fail', `Queue paused`);
}

async function resumeQueue(target) {
  await api(`/api/imports/${target}/resume`, { method: 'POST' });
  addActivity('active', `Queue resumed`);
}

// ── Init ──
connectSSE();
refreshAll();
setInterval(refreshAll, 5000);
</script>

</body>
</html>
